# AI bot and agent classifier rules.
# Evaluated top to bottom; first match wins.
# Category values used downstream: crawler, agent, human_via_ai.
#
# Sources:
#  - https://github.com/ai-robots-txt/ai.robots.txt (community-maintained robots.json)
#  - https://platform.openai.com/docs/bots
#  - https://docs.anthropic.com/en/docs/agents-and-tools/claude-bot
#  - https://docs.perplexity.ai/guides/bots
#  - https://developers.cloudflare.com/ai-crawl-control/reference/bots/
#  - https://darkvisitors.com/ (Known Agents)
#
# Category heuristic:
#   crawler      : background training / indexing fetcher, not tied to a user prompt
#   agent        : user-triggered fetch, a human asked an AI to visit a page
#   human_via_ai : matched on referer; a real person arriving from an AI UI

