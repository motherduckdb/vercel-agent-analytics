<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vercel Agent Analytics</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #383838;
        --muted: #5f6368;
        --line: #d9dde1;
        --sun: #ffde02;
        --sky: #6fc2ff;
        --garden: #16aa98;
        --watermelon: #ff7169;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #f8faf9;
        color: var(--ink);
      }

      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 72px 0 56px;
      }

      header {
        border-top: 8px solid var(--sun);
        padding-top: 32px;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(2.4rem, 8vw, 5.8rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .lede {
        max-width: 680px;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: 1.2rem;
        line-height: 1.55;
      }

      .status {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        margin-top: 48px;
        background: var(--line);
        border: 1px solid var(--line);
      }

      .status div {
        min-height: 140px;
        padding: 20px;
        background: #fff;
      }

      .label {
        display: block;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      code {
        overflow-wrap: anywhere;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 0.95rem;
      }

      .bar {
        display: flex;
        gap: 8px;
        margin-top: 40px;
      }

      .bar span {
        display: block;
        height: 8px;
        flex: 1;
      }

      .bar span:nth-child(1) { background: var(--sun); }
      .bar span:nth-child(2) { background: var(--sky); }
      .bar span:nth-child(3) { background: var(--garden); }
      .bar span:nth-child(4) { background: var(--watermelon); }

      @media (max-width: 720px) {
        main {
          padding-top: 40px;
        }

        .status {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Vercel Agent Analytics</h1>
        <p class="lede">
          This collector is ready. Connect Log Drains from one or more Vercel
          projects to <code>/api/drain</code> to classify AI traffic and write
          the results to MotherDuck.
        </p>
      </header>

      <section class="status" aria-label="Deployment details">
        <div>
          <span class="label">Collector endpoint</span>
          <code>/api/drain</code>
        </div>
        <div>
          <span class="label">Drain format</span>
          <code>NDJSON</code>
        </div>
        <div>
          <span class="label">Secrets</span>
          <code>VERCEL_DRAIN_SECRET(S)</code>
        </div>
      </section>

      <div class="bar" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </main>
  </body>
</html>
